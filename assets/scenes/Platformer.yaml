entities:
  - name: "Ambient"
    components:
      - name: "LIGHT"
        lightData:
          color: [0.5, 0.5, 0.5, 1]
          ambient: 0.2
          type: "AMBIENT"
  - components:
      - name: "LIGHT"
        lightData:
          color: [ 1, 1, 1 ]
          direction: [ 1, -1, 0 ]
          specular: 0.2
          diffuse: 0.8
          type: "DIRECTIONAL"
  - name: "Floor"
    components:
      - name: "TRANSFORM"
        position: [0, 0, 0]
        scale: [50, 1, 50]
      - name: "COLLIDER"
        type: "PLANE"
        profile:
          type: "STATIC"
          mode: "ALL"
      - name: "MODEL"
        mesh:
          primitive: "PLANE"
          material:
            texturePaths: ["assets/2dImages/ground.jpg"]
            wrapMode: "REPEAT"
            materialData:
              type: TEXTURE
              shininess: 10
  # - components:
  #     - name: "TRANSFORM"
  #       position: [10, 3, -5]
  #       scale: [7, 6, 15]
