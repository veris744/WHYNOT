  - name: "Platform"
    components:
      - name: "TRANSFORM"
        position: [10, 2, 0]
        scale: [5, 1, 5]
      - name: "COLLIDER"
        type: "BOX"
        profile:
          type: "STATIC"
          mode: "ALL"
      - name: "MODEL"
        mesh:
          primitive: "BOX"
          material:
            fragmentShaderPath: "shaders/fragmentColor.glsl"
            materialData:
              type: COLOR
              color: [1, 0, 1]
              shininess: 10
      - name: "SEQUENCE"
        isLooping: true
        playOnStart: true
        states:
          [[[10,2,0], [0,0,0], [5,1,5], 0.5],
          [[15,2,0], [0,0,0], [5,1,5], 0.5],
          [[10,2,0], [0,0,0], [5,1,5], 0.5]]
